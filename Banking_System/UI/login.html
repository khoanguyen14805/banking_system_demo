<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EIU Digital Banking - Đăng Nhập</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-200 transition-all duration-300 hover:shadow-2xl">

        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-blue-600 text-white text-2xl font-bold mb-3 shadow-md shadow-blue-200">
                E
            </div>
            <h1 class="text-2xl font-bold text-slate-800 tracking-tight">EIU DIGITAL BANKING</h1>
            <p class="text-sm text-slate-500 mt-1">Hệ thống quản lý giao dịch nội bộ</p>
        </div>

        <div id="errorAlert" class="hidden mb-4 p-3 bg-red-50 border border-red-200 text-red-600 text-sm rounded-lg flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd" />
            </svg>
            <span id="errorMessage">Tài khoản hoặc mật khẩu không chính xác.</span>
        </div>

        <!-- Form Đăng Nhập -->
        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Tên đăng nhập</label>
                <input type="text" id="username" required
                       class="w-full px-4 py-2.5 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                       placeholder="Nhập username của bạn...">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Mật khẩu</label>
                <input type="password" id="password" required
                       class="w-full px-4 py-2.5 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                       placeholder="••••••••">
            </div>

            <button type="submit" id="btnSubmit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl shadow-lg shadow-blue-100 transition-all active:scale-[0.98] flex items-center justify-center gap-2">
                <span>Đăng Nhập An Toàn</span>
            </button>
        </form>

        <!-- PHẦN THÊM MỚI: Nút chuyển sang trang Đăng ký nếu chưa có tài khoản -->
        <div class="mt-6 pt-5 border-t border-slate-100 text-center text-sm text-slate-600">
            Bạn chưa có tài khoản ngân hàng?
            <a href="/register.html" class="block mt-2 w-full text-center bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium py-2 rounded-xl transition-all active:scale-[0.98]">
                Đăng Ký Tài Khoản Mới
            </a>
        </div>

        <!-- Footer trang login -->
        <div class="mt-8 text-center text-xs text-slate-400">
            &copy; 2026 Eastern International University. SE Faculty.
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault(); // Chặn hành vi load lại trang mặc định của Form

            const usernameInput = document.getElementById('username').value.trim();
            const passwordInput = document.getElementById('password').value;
            const errorAlert = document.getElementById('errorAlert');
            const errorMessage = document.getElementById('errorMessage');
            const btnSubmit = document.getElementById('btnSubmit');

            // Đổi trạng thái nút bấm sang hiệu ứng Loading
            btnSubmit.disabled = true;
            btnSubmit.innerHTML = '<span>Đang xác thực...</span>';
            errorAlert.classList.add('hidden');

            try {
                // Gọi API Login của Backend (Sửa lại đúng URL endpoint thực tế của bạn nếu khác)
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: usernameInput,
                        password: passwordInput
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    // Đăng nhập thành công -> Lưu JWT Token vào sessionStorage (biến mất khi tắt trình duyệt)
                    sessionStorage.setItem('token', data.token);
                    sessionStorage.setItem('username', usernameInput);

                    // Chuyển hướng sang trang Dashboard/Transfer (Chúng ta sẽ làm file này ở bước tiếp theo)
                    window.location.href = '/transfer.html';
                } else {
                    // Hiện lỗi từ Backend trả về (Ví dụ: "Tài khoản bị khóa" hoặc "Sai mật khẩu")
                    errorMessage.innerText = data.message || 'Đăng nhập thất bại. Vui lòng kiểm tra lại.';
                    errorAlert.classList.remove('hidden');
                }
            } catch (error) {
                // Xử lý lỗi kết nối mạng hoặc sập server
                errorMessage.innerText = 'Không thể kết nối đến máy chủ Backend.';
                errorAlert.classList.remove('hidden');
            } finally {
                // Trả lại trạng thái nút bấm ban đầu
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = '<span>Đăng Nhập An Toàn</span>';
            }
        });
    </script>
</body>
</html>
